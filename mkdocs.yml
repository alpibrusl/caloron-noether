site_name: Caloron-Noether
site_description: Multi-Agent Orchestration via Noether Composition Graphs
repo_url: https://github.com/alpibrusl/caloron-noether

theme:
  name: material
  palette:
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.tabs.link
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - tables
  - attr_list
  - def_list
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Guide:
    - Getting Started: guide/getting-started.md
    - Architecture: guide/architecture.md
    - Stages: guide/stages.md
    - Composition Graphs: guide/compositions.md
    - The Shell: guide/shell.md
    - Stage Promotion: guide/promotion.md
  - Reference:
    - Stage Catalog: reference/stage-catalog.md
    - KV Conventions: reference/kv-conventions.md
    - Scheduler Config: reference/scheduler.md
    - Shell API: reference/shell-api.md
  - Examples:
    - E2E Sprint: examples/e2e-sprint.md
    - Comparison Test: examples/comparison.md
  - vs Original Caloron: comparison.md
