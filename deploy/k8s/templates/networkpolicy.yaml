# Restrict agent workers: can only reach Gitea + LLM APIs + coordinator
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: caloron-worker-policy
spec:
  podSelector:
    matchLabels:
      app: caloron-worker
  policyTypes:
    - Egress
  egress:
    # Allow DNS
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow Gitea (internal)
    - to:
        - podSelector:
            matchLabels:
              app: gitea
      ports:
        - port: 3000
    # Allow coordinator (internal)
    - to:
        - podSelector:
            matchLabels:
              app: caloron-coordinator
    # Allow Postgres (internal)
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
    # Allow HTTPS to external LLM APIs
    - to: []
      ports:
        - port: 443
          protocol: TCP
