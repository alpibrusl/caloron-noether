# Template: FastAPI + PostgreSQL
# Usage: matched automatically when task needs [rest-api-development, sql-database]
# Or manually: caloron template apply fastapi-postgres

name: FastAPI + PostgreSQL
description: Async FastAPI app with SQLAlchemy, Alembic, and PostgreSQL

# Matching rules — HR Agent uses these to auto-select
match:
  skills: [rest-api-development, sql-database]
  keywords: [fastapi, postgres, database, sqlalchemy, api]

# Dependencies
dependencies:
  python:
    - fastapi>=0.115
    - uvicorn[standard]>=0.30
    - pydantic>=2.0
    - pydantic-settings>=2.0
    - sqlalchemy>=2.0
    - asyncpg>=0.29
    - alembic>=1.13
  dev:
    - pytest>=8.0
    - httpx>=0.27
    - ruff>=0.4
    - pytest-asyncio>=0.23

# Files to generate (path → content)
files:
  pyproject.toml: |
    [project]
    name = "{{ project_name }}"
    version = "0.1.0"
    requires-python = ">=3.11"
    dependencies = {{ dependencies.python | tojson }}

    [project.optional-dependencies]
    dev = {{ dependencies.dev | tojson }}

    [tool.pytest.ini_options]
    testpaths = ["tests"]
    asyncio_mode = "auto"

    [tool.ruff]
    target-version = "py311"
    line-length = 100

  src/__init__.py: |
    """{{ project_name }} package."""

  src/main.py: |
    """FastAPI application."""
    from fastapi import FastAPI
    from src.config import settings

    app = FastAPI(title=settings.app_name, version="0.1.0")

    @app.get("/health")
    async def health() -> dict:
        return {"status": "ok"}

  src/config.py: |
    """Configuration from environment."""
    from pydantic_settings import BaseSettings

    class Settings(BaseSettings):
        app_name: str = "{{ project_name }}"
        debug: bool = False
        database_url: str = "postgresql+asyncpg://localhost:5432/{{ project_name }}"
        class Config:
            env_file = ".env"

    settings = Settings()

  src/database.py: |
    """Async database session."""
    from sqlalchemy.ext.asyncio import AsyncSession, create_async_engine, async_sessionmaker
    from src.config import settings

    engine = create_async_engine(settings.database_url, echo=settings.debug)
    async_session = async_sessionmaker(engine, class_=AsyncSession, expire_on_commit=False)

    async def get_db():
        async with async_session() as session:
            yield session

  src/models.py: |
    """SQLAlchemy models."""
    from sqlalchemy.orm import DeclarativeBase

    class Base(DeclarativeBase):
        pass

  tests/__init__.py: ""
  tests/conftest.py: |
    import pytest
    from fastapi.testclient import TestClient
    from src.main import app

    @pytest.fixture
    def client():
        return TestClient(app)

  tests/test_health.py: |
    def test_health(client):
        r = client.get("/health")
        assert r.status_code == 200
        assert r.json()["status"] == "ok"

# CI / DevOps
ci:
  github_actions: |
    name: CI
    on: [push, pull_request]
    jobs:
      test:
        runs-on: ubuntu-latest
        services:
          postgres:
            image: postgres:16-alpine
            env: { POSTGRES_USER: test, POSTGRES_PASSWORD: test, POSTGRES_DB: test }
            ports: ["5432:5432"]
            options: --health-cmd="pg_isready -U test" --health-interval=5s
        steps:
          - uses: actions/checkout@v4
          - uses: actions/setup-python@v5
            with: { python-version: "3.11" }
          - run: pip install -e ".[dev]"
          - run: ruff check src/ tests/
          - run: pytest -v
            env: { DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/test" }

  pre_commit: |
    repos:
      - repo: https://github.com/astral-sh/ruff-pre-commit
        rev: v0.4.0
        hooks:
          - id: ruff
            args: [--fix]
          - id: ruff-format

  dockerfile: |
    FROM python:3.11-slim AS builder
    WORKDIR /app
    COPY pyproject.toml .
    RUN pip install --no-cache-dir .

    FROM python:3.11-slim
    WORKDIR /app
    COPY --from=builder /usr/local /usr/local
    COPY src/ src/
    EXPOSE 8000
    CMD ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000"]

  docker_compose: |
    services:
      app:
        build: .
        ports: ["8000:8000"]
        environment:
          DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/app
        depends_on:
          postgres: { condition: service_healthy }
      postgres:
        image: postgres:16-alpine
        environment: { POSTGRES_USER: app, POSTGRES_PASSWORD: app, POSTGRES_DB: app }
        healthcheck:
          test: ["CMD", "pg_isready", "-U", "app"]
          interval: 5s
